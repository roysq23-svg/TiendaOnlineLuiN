<!DOCTYPE html>
<html lang="es"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLO STUDIO | Store & Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo" id="secretLogo">
                <img src="Logo.jpeg" alt="POLO STUDIO" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
            </div>
            <div class="menu">
                <button onclick="switchTab('store')">Tienda</button>
                <button id="tab-admin" onclick="switchTab('admin')" style="display:none;">Gestión</button>
                <button class="cart-btn" onclick="switchTab('cart')">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section id="panel-store" class="panel active">
            <h2 class="section-title">Nuestra Colección</h2>
            <div class="products-grid" id="storeGrid"></div>
        </section>

        <section id="panel-cart" class="panel">
            <h2 class="section-title">Tu Pedido</h2>
            <div id="cartItemsList" class="max-width-container"></div>
            <div id="cartFooter" class="max-width-container" style="display:none;">
                <h3 id="cartTotalVal">Total: S/ 0.00</h3>
                <button class="btn-primary wsp-bg" onclick="sendWhatsApp()">FINALIZAR POR WHATSAPP</button>
            </div>
        </section>

        <section id="panel-admin" class="panel">
            <div class="admin-header">
                <h2>PANEL DE CONTROL</h2>
                <button class="btn-outline" onclick="switchTab('store')">Salir de Admin</button>
            </div>
            
            <div class="admin-grid">
                <div class="admin-card admin-form">
                    <h3 id="formTitle">Agregar Polo</h3>
                    <input type="hidden" id="editPoloId">
                    
                    <label for="imgFileInput" class="file-drop-area" id="fileLabel">
                        📷 Seleccionar Imagen
                    </label>
                    <input type="file" id="imgFileInput" accept="image/*" hidden onchange="updateLabel()">
                    
                    <input type="text" id="prodName" placeholder="Nombre (Ej: Polo Oversize)">
                    <input type="number" id="prodPrice" placeholder="Precio (Ej: 45.00)" step="0.01">
                    <input type="number" id="prodStock" placeholder="Stock (Ej: 10)" value="0">
                    
                    <!-- Categoría -->
                    <select id="prodCategoria">
                        <option value="Básico">Básico</option>
                        <option value="Premium">Premium</option>
                        <option value="Edición Limitada">Edición Limitada</option>
                        <option value="Deportivo">Deportivo</option>
                    </select>
                    
                    <textarea id="prodDesc" placeholder="Descripción detallada..." rows="3"></textarea>
                    
                    <!-- Colores -->
                    <label style="font-weight:600; margin-top:10px; display:block;">Colores (separados por coma)</label>
                    <input type="text" id="prodColores" placeholder="Ej: Rojo, Azul, Negro, Blanco">
                    
                    <!-- Tallas con checkboxes -->
                    <label style="font-weight:600; margin-top:10px; display:block;">Tallas disponibles</label>
                    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">
                        <label><input type="checkbox" class="talla-check" value="XS"> XS</label>
                        <label><input type="checkbox" class="talla-check" value="S"> S</label>
                        <label><input type="checkbox" class="talla-check" value="M"> M</label>
                        <label><input type="checkbox" class="talla-check" value="L"> L</label>
                        <label><input type="checkbox" class="talla-check" value="XL"> XL</label>
                        <label><input type="checkbox" class="talla-check" value="XXL"> XXL</label>
                    </div>
                    
                    <button class="btn-primary" id="saveBtn" onclick="saveProduct()">GUARDAR CAMBIOS</button>
                    <button id="cancelEdit" class="btn-cancel" onclick="resetForm()" style="display:none;">Cancelar Edición</button>
                </div>

                <div class="admin-card">
                    <h3>Inventario Actual</h3>
                    <div id="adminInventoryList" class="inventory-list"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-modal" onclick="closeModal()">×</button>
            <img id="modalImg" class="modal-img" src="">
            <div class="modal-content">
                <span id="modalCategoria" class="modal-categoria"></span>
                <h2 id="modalName"></h2>
                <p id="modalPrice" class="modal-price"></p>
                <p id="modalDesc" class="modal-desc"></p>

                <!-- COLORES -->
                <div class="selector-section">
                    <p class="selector-label">🎨 Color: <span id="colorSeleccionado">—</span></p>
                    <div id="colorOptions" class="color-options"></div>
                </div>

                <!-- TALLAS -->
                <div class="selector-section">
                    <p class="selector-label">📏 Talla: <span id="tallaSeleccionada">—</span></p>
                    <div id="tallaOptions" class="talla-options"></div>
                </div>

                <div id="stockWarning" class="stock-warning" style="display:none;">
                    ⚠️ Solo quedan <span id="stockNum"></span> unidades
                </div>

                <button class="btn-primary" id="btnAddCart" onclick="addToCartFromModal()">
                    🛒 AÑADIR AL CARRITO
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
